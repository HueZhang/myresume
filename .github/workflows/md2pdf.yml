name: Markdown to PDF

on:
  push:
    branches:
      - main

jobs:
  convert_md_to_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint fonts-noto-cjk

      - name: Create optimized style.css
        run: |
          cat <<EOF > style.css
          @page {
            size: A4;
            margin: 1.2cm; /* 原来 2cm，减少外边距 */
            @bottom-center {
              content: counter(page);
              font-size: 9pt;
              color: #777;
            }
          }
          body {
            font-family: 'Noto Sans CJK SC', sans-serif;
            font-size: 10.5pt; /* 原来 12pt，字体略小 */
            line-height: 1.35;  /* 原来 1.5，行距更紧凑 */
            color: #333;
          }
          h1, h2, h3 {
            color: #2c3e50;
            margin-top: 1.2em; /* 原来 1.5em */
            margin-bottom: 0.5em;
          }
          h1 {
            font-size: 18pt; /* 原来 24pt */
            border-bottom: 1.5px solid #2c3e50;
            padding-bottom: 0.15em;
          }
          h2 {
            font-size: 14pt; /* 原来 18pt */
            border-bottom: 1px solid #bbb;
            padding-bottom: 0.1em;
          }
          a {
            color: #2c7bb6;
            text-decoration: none;
          }
          a:hover {
            text-decoration: underline;
          }
          ul, ol {
            margin-left: 1.2em; /* 原来 1.5em */
          }
          code {
            background-color: #f5f5f5;
            padding: 1px 3px;
            border-radius: 3px;
          }
          pre {
            background-color: #f5f5f5;
            padding: 0.8em;
            border-radius: 3px;
            overflow-x: auto;
            font-size: 9.5pt; /* 代码字体也稍微小一点 */
          }
          EOF

      - name: Create pdf directory if not exists
        run: |
          if [ ! -d "pdf" ]; then
            mkdir pdf
          fi

      - name: Get changed markdown files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            *.md

      - name: Convert changed or new Markdown files to PDF
        run: |
          # 获取变更的文件列表
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          ANY_CHANGED="${{ steps.changed-files.outputs.any_changed }}"
          echo "Any changed: $ANY_CHANGED"
          echo "Changed files: $CHANGED_FILES"

          # 如果没有变更（首次运行等情况），转换所有文件
          if [ "$ANY_CHANGED" = "false" ] || [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected, converting all markdown files..."
            for md_file in *.md; do
              if [ -f "$md_file" ] && [[ "$md_file" != "README.md" ]]; then
                pdf_name="${md_file%.md}.pdf"
                echo "Converting $md_file to pdf/$pdf_name"
                pandoc "$md_file" \
                  -f gfm \
                  -t html5 \
                  --wrap=preserve \
                  -c style.css \
                  --pdf-engine=weasyprint \
                  -o "pdf/$pdf_name"
              fi
            done
          else
            # 转换变更的文件
            for md_file in $CHANGED_FILES; do
              if [ -f "$md_file" ] && [[ "$md_file" != "README.md" ]]; then
                pdf_name="${md_file%.md}.pdf"
                echo "Converting $md_file to pdf/$pdf_name"
                pandoc "$md_file" \
                  -f gfm \
                  -t html5 \
                  --wrap=preserve \
                  -c style.css \
                  --pdf-engine=weasyprint \
                  -o "pdf/$pdf_name"
              fi
            done
          fi

      - name: Commit and push PDF
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add pdf/
          git commit -m "Convert all markdown files to PDF"
          git push
